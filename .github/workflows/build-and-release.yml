name: Build and Release Flutter APK

on:
  push:
    branches:
      - main
      - master
      - feature/image-find-feature-redesign
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
      - feature/image-find-feature-redesign
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'feature/image-find-feature-redesign'
        type: string

permissions:
  contents: write

env:
  JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
  GRADLE_OPTS: "-Djava.net.preferIPv4Stack=true"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', 'android/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get dependencies
        run: flutter pub get

      - name: Use local Gradle distribution
        run: |
          GRADLE_ZIP="${{ github.workspace }}/android/gradle/gradle-9.1.0-all.zip"
          if [ ! -f "$GRADLE_ZIP" ]; then
            echo "Gradle distribution not found in repository"
            exit 1
          fi
          ls -lh "$GRADLE_ZIP"
          # 让 wrapper 直接读仓库里的本地文件，不再走网络
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\ndistributionUrl=file\\://%s\n' "$GRADLE_ZIP" > "${{ github.workspace }}/android/gradle/wrapper/gradle-wrapper.properties"
          cat "${{ github.workspace }}/android/gradle/wrapper/gradle-wrapper.properties"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
